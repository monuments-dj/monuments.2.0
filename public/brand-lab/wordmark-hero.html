<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MONUMENTS / Living wordmark</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --ink:#0A0A0A; --paper:#F4F4F2; --denim:#3E6E94; --rose:#EFA1AD;
    --panel:#121212; --line:#262626; --dim:#8A8A88;
    --grot:'Archivo',Helvetica,Arial,sans-serif;
    --mono:'Space Mono',monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{background:var(--ink);color:var(--paper)}

  body{
    font-family:var(--grot);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }

  .stage{
    position:relative;
    min-height:100svh;
    width:100%;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    isolation:isolate;
  }

  /* ---- background field of soft suns ---- */
  .field{
    position:absolute;
    inset:0;
    z-index:0;
    pointer-events:none;
  }
  .field .sun{
    position:absolute;
    color:var(--line);
    opacity:.55;
    will-change:transform,opacity;
  }
  .field .sun.denim{ color:#1d3850; opacity:.7; }
  .field .sun svg{display:block;width:100%;height:100%}

  /* faint vignette so the centre reads */
  .stage::after{
    content:"";
    position:absolute;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:radial-gradient(120% 90% at 50% 42%, transparent 38%, rgba(10,10,10,.55) 78%, rgba(10,10,10,.9) 100%);
  }

  /* ---- top bar ---- */
  .topbar{
    position:relative;
    z-index:3;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:1.6rem clamp(1.25rem,4vw,3rem);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--dim);
  }
  .topbar .badge{display:flex;align-items:center;gap:.6rem}
  .topbar .badge svg{width:18px;height:18px;color:var(--paper)}
  .topbar .right{color:var(--dim)}
  .topbar .right .pulse{color:var(--rose)}

  /* ---- centre wordmark block ---- */
  .center{
    position:relative;
    z-index:3;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:2rem clamp(1.25rem,5vw,4rem) 1rem;
  }

  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--dim);
    margin-bottom:clamp(1.4rem,3vw,2.4rem);
    opacity:0;
    animation:rise .9s .15s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .eyebrow .dot{color:var(--rose)}

  .wordmark{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.04em;
    line-height:.82;
    font-weight:900;
    letter-spacing:-.03em;
    /* sized to keep all of M-eye-NUMENTS on screen with side gutters */
    font-size:clamp(38px,10.2vw,150px);
    width:100%;
    max-width:100%;
    color:var(--paper);
    opacity:0;
    animation:rise 1s .3s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .wordmark .seg{display:inline-block}

  /* the eye sits in place of the O */
  .eye-o{
    display:inline-block;
    width:.92em;
    height:.92em;
    position:relative;
    transform:translateY(.02em);
  }
  .eye-o svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    overflow:visible;
  }
  .eye-shell{color:var(--paper)}
  .eye-lid{color:var(--ink)}
  .spark-pupil{color:var(--rose)}

  .tagline{
    font-family:var(--mono);
    font-size:clamp(12px,1.5vw,15px);
    letter-spacing:.1em;
    color:var(--paper);
    margin-top:clamp(1.6rem,3.5vw,2.6rem);
    opacity:0;
    animation:rise 1s .55s cubic-bezier(.2,.7,.2,1) forwards;
  }

  /* ---- thin rule + colophon ---- */
  .footer{
    position:relative;
    z-index:3;
    padding:0 clamp(1.25rem,4vw,3rem) 1.8rem;
    opacity:0;
    animation:rise 1s .8s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .rule{
    height:1px;
    width:100%;
    background:var(--line);
    margin-bottom:1.1rem;
    transform-origin:left center;
    transform:scaleX(0);
    animation:wipe 1.1s .85s cubic-bezier(.65,0,.35,1) forwards;
  }
  .colophon{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
    flex-wrap:wrap;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--dim);
  }
  .colophon .sep{color:var(--line)}
  .colophon .alt{color:var(--paper)}

  /* ---- symbol cluster, far corners ---- */
  .corner-sym{
    position:absolute;
    z-index:2;
    width:clamp(26px,4vw,42px);
    height:clamp(26px,4vw,42px);
    color:var(--line);
    opacity:.0;
    animation:fadeIn 1.2s 1s ease forwards;
  }
  .corner-sym.tl{top:clamp(5.5rem,14vh,8rem);left:clamp(1.25rem,4vw,3rem)}
  .corner-sym.br{bottom:clamp(5.5rem,14vh,8rem);right:clamp(1.25rem,4vw,3rem)}
  .corner-sym svg{width:100%;height:100%;display:block}

  /* ---- keyframes ---- */
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes wipe{to{transform:scaleX(1)}}
  @keyframes fadeIn{to{opacity:.5}}

  /* spark slow spin (pupil) */
  .spark-pupil{
    transform-box:fill-box;
    transform-origin:center;
    animation:spin 22s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* the corner asterisk spins too, opposite */
  .corner-sym.tl svg g{
    transform-box:fill-box;
    transform-origin:center;
    animation:spinR 30s linear infinite;
  }
  @keyframes spinR{to{transform:rotate(-360deg)}}

  /* blink — scaleY of the lid sweep handled in JS via class; CSS drives the lid */
  .eye-lid-group{
    transform-box:fill-box;
    transform-origin:center;
    transform:scaleY(0);
  }
  .eye-o.blink .eye-lid-group{
    animation:blink .42s ease both;
  }
  @keyframes blink{
    0%{transform:scaleY(0)}
    40%{transform:scaleY(1.05)}
    60%{transform:scaleY(1.05)}
    100%{transform:scaleY(0)}
  }

  /* drifting suns */
  .sun.d1{animation:drift1 26s ease-in-out infinite}
  .sun.d2{animation:drift2 32s ease-in-out infinite}
  .sun.d3{animation:drift3 38s ease-in-out infinite}
  .sun.d4{animation:drift4 30s ease-in-out infinite}
  .sun.d5{animation:drift5 34s ease-in-out infinite}
  @keyframes drift1{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(2.2vw,-1.6vh) rotate(14deg)}}
  @keyframes drift2{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-1.8vw,2vh) rotate(-12deg)}}
  @keyframes drift3{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(1.4vw,2.4vh) rotate(10deg)}}
  @keyframes drift4{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-2.4vw,-1.2vh) rotate(-9deg)}}
  @keyframes drift5{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(1vw,-2vh) rotate(7deg)}}

  @media (max-width:600px){
    .colophon{font-size:10px;letter-spacing:.12em}
    .topbar{font-size:10px}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition:none !important}
    .eyebrow,.wordmark,.tagline,.footer{opacity:1;transform:none}
    .rule{transform:scaleX(1)}
    .corner-sym{opacity:.5}
    .eye-lid-group{transform:scaleY(0)}
    .spark-pupil{animation:none}
  }
</style>
</head>
<body>
  <section class="stage" aria-label="Monuments living wordmark">

    <div class="field" id="field" aria-hidden="true"></div>

    <span class="corner-sym tl" aria-hidden="true">
      <svg viewBox="0 0 100 100"><g transform="translate(50,50)" fill="currentColor"><rect x="-3" y="-38" width="6" height="76" rx="3"/><rect x="-3" y="-38" width="6" height="76" rx="3" transform="rotate(60)"/><rect x="-3" y="-38" width="6" height="76" rx="3" transform="rotate(120)"/></g></svg>
    </span>
    <span class="corner-sym br" aria-hidden="true">
      <svg viewBox="0 0 100 100"><path d="M50 6 C54 36 64 46 94 50 C64 54 54 64 50 94 C46 64 36 54 6 50 C36 46 46 36 50 6 Z" fill="currentColor"/></svg>
    </span>

    <header class="topbar">
      <span class="badge">
        <svg viewBox="0 0 100 100" aria-hidden="true"><path d="M14 50 C32 28 68 28 86 50 C68 72 32 72 14 50 Z" fill="none" stroke="currentColor" stroke-width="7"/><circle cx="50" cy="50" r="9" fill="currentColor"/></svg>
        Laboratory
      </span>
      <span class="right">Brand book <span class="pulse">·</span> No. 004259</span>
    </header>

    <div class="center">
      <p class="eyebrow">The mark, alive <span class="dot">·</span> Title card</p>

      <h1 class="wordmark" aria-label="MONUMENTS">
        <span class="seg">M</span>
        <span class="eye-o" id="eyeO" aria-hidden="true">
          <svg viewBox="0 0 100 100">
            <path class="eye-shell" d="M8 50 C30 24 70 24 92 50 C70 76 30 76 8 50 Z" fill="none" stroke="currentColor" stroke-width="7"/>
            <g transform="translate(50,50)">
              <rect class="spark-pupil" x="-3" y="-17" width="6" height="34" rx="3" fill="currentColor"/>
              <rect class="spark-pupil" x="-3" y="-17" width="6" height="34" rx="3" transform="rotate(60)" fill="currentColor"/>
              <rect class="spark-pupil" x="-3" y="-17" width="6" height="34" rx="3" transform="rotate(120)" fill="currentColor"/>
            </g>
            <g class="eye-lid-group">
              <path class="eye-lid" d="M8 50 C30 24 70 24 92 50 C70 76 30 76 8 50 Z" fill="currentColor"/>
            </g>
          </svg>
        </span>
        <span class="seg">NUMENTS</span>
      </h1>

      <p class="tagline">Built to be remembered.</p>
    </div>

    <footer class="footer">
      <div class="rule"></div>
      <div class="colophon">
        <span>MONUMENTS &copy; 2026 <span class="sep">·</span> NO. 004259 <span class="sep">·</span> EST. MMXXVI <span class="sep">·</span> <span class="alt">LA / NY</span></span>
        <span>We build things worth remembering.</span>
      </div>
    </footer>

  </section>

<script>
(function(){
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---------- soft suns ---------- */
  function petal(w,L){
    return 'M0 0 C '+(-w)+' '+(-L*0.25)+', '+(-w)+' '+(-L*0.78)+', 0 '+(-L)+
           ' C '+w+' '+(-L*0.78)+', '+w+' '+(-L*0.25)+', 0 0 Z';
  }
  function makeSun(opts){
    var n = opts.n || 9, base = opts.base || 24, len = opts.len || 66;
    var ns='http://www.w3.org/2000/svg';
    var svg=document.createElementNS(ns,'svg');
    svg.setAttribute('viewBox','0 0 240 240');
    for(var i=0;i<n;i++){
      var deg = (360/n)*i + (opts.jitter? (Math.random()*8-4):0);
      var L = len + (opts.jitter? (Math.random()*10-5):0);
      var w = (opts.w||16) + (opts.jitter? (Math.random()*4-2):0);
      var g=document.createElementNS(ns,'g');
      g.setAttribute('transform','translate(120,120) rotate('+deg+') translate(0,'+(-base)+')');
      var p=document.createElementNS(ns,'path');
      p.setAttribute('d',petal(w,L));
      p.setAttribute('fill','currentColor');
      g.appendChild(p);
      svg.appendChild(g);
    }
    var c=document.createElementNS(ns,'circle');
    c.setAttribute('cx','120');c.setAttribute('cy','120');
    c.setAttribute('r',(base+10));c.setAttribute('fill','currentColor');
    svg.appendChild(c);
    return svg;
  }

  var field = document.getElementById('field');
  // x%, y%, size(px-ish via vmin), driftClass, denim?
  var suns = [
    {x:8,  y:18, s:20, d:'d1', denim:false, base:22, len:60, w:15},
    {x:84, y:12, s:14, d:'d2', denim:true,  base:24, len:66, w:16},
    {x:72, y:74, s:24, d:'d3', denim:false, base:24, len:70, w:17},
    {x:16, y:78, s:16, d:'d4', denim:true,  base:22, len:62, w:15},
    {x:50, y:8,  s:11, d:'d5', denim:false, base:20, len:58, w:14},
    {x:92, y:52, s:13, d:'d1', denim:false, base:22, len:60, w:15},
    {x:4,  y:48, s:12, d:'d3', denim:true,  base:20, len:56, w:14}
  ];
  suns.forEach(function(o){
    var wrap=document.createElement('div');
    wrap.className='sun '+o.d+(o.denim?' denim':'');
    wrap.style.left=o.x+'%';
    wrap.style.top=o.y+'%';
    wrap.style.width=o.s+'vmin';
    wrap.style.height=o.s+'vmin';
    wrap.style.marginLeft=(-o.s/2)+'vmin';
    wrap.style.marginTop=(-o.s/2)+'vmin';
    wrap.appendChild(makeSun({n:9,base:o.base,len:o.len,w:o.w,jitter:true}));
    field.appendChild(wrap);
  });

  /* ---------- occasional blink ---------- */
  if(!reduce){
    var eye=document.getElementById('eyeO');
    function blinkOnce(){
      eye.classList.add('blink');
      setTimeout(function(){ eye.classList.remove('blink'); }, 480);
      schedule();
    }
    function schedule(){
      var t = 3600 + Math.random()*4200; // 3.6s to 7.8s
      setTimeout(function(){
        // sometimes a quick double-blink
        if(Math.random()<0.22){
          eye.classList.add('blink');
          setTimeout(function(){ eye.classList.remove('blink'); },220);
          setTimeout(blinkOnce, 320);
        } else {
          blinkOnce();
        }
      }, t);
    }
    // first blink slightly after the intro settles
    setTimeout(blinkOnce, 2200);
  }
})();
</script>
</body>
</html>
